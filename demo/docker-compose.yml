services:
  db:
    image: postgres
    restart: always
    environment:
        POSTGRES_USER: postgres
        POSTGRES_PASSAWORD: postgres
        POSTGRE_DB: imagelite
    ports:
        - '5432:5432'
    volumes:
        - ./data:/var/lib/postgresql/data


  pgadmin:
      image: dpage/pgadmin4
      restart: always
      environment:
        PGADMIN_DEFAULT_PASSAWORD: admin
        PGADMIN_DEFAULT_EMAIL: admin@admin.com
      ports:
        - '15432:80'
      depends_on:
        - db

